AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Root Maze — shared family tree. S3 + CloudFront static SPA with a Lambda +
  API Gateway + DynamoDB backend, deployed by GitHub Actions via OIDC.
  One template, deployed twice (root-maze-staging and root-maze-prod).

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, prod]
    Description: Which environment this stack represents.
  GitHubOrg:
    Type: String
    Default: differentmatt
  GitHubRepo:
    Type: String
    Default: root-maze
  AllowedRefPattern:
    Type: String
    Default: '*'
    Description: >
      GitHub OIDC `sub` ref pattern allowed to assume the deploy role.
      Prod passes 'ref:refs/heads/main'; staging passes '*' so feature
      branches can deploy to staging.
  GoogleClientId:
    Type: String
    Default: ''
    Description: Google OAuth client ID, for server-side JWT verification.
  DomainName:
    Type: String
    Default: ''
    Description: >
      Custom apex domain for this environment (prod only), e.g. rootmaze.com.
      Empty = serve on the default CloudFront domain. When set, the
      distribution also serves www.<DomainName>.
  CertificateArn:
    Type: String
    Default: ''
    Description: >
      ACM certificate ARN (us-east-1) covering DomainName and www.DomainName.
      Required to attach the custom domain.
  CreateOIDCProvider:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Set 'true' only if the GitHub OIDC provider does not already exist in
      this AWS account. (The log-doom stack already created it, so default
      is 'false'.)

Conditions:
  ShouldCreateOIDCProvider: !Equals [!Ref CreateOIDCProvider, 'true']
  HasCustomDomain: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # --- Static site bucket ---
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-site'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- DynamoDB single table (+ GSI1 reverse lookup) ---
  DataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-data'
      BillingMode: PAY_PER_REQUEST
      # Point-in-time recovery: continuous backups so a bad change (or a botched
      # future migration) can be restored to any second in the last 35 days.
      # Enabled on both stacks; the cost is negligible at this data size.
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # --- Lambda ---
  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-api-lambda'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt DataTable.Arn
                  - !Sub '${DataTable.Arn}/index/*'

  MeFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-me'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: handlers/me.handler
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: 10
      Role: !GetAtt ApiLambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 503, body: '{"error":"Not deployed yet"}' });

  GroupsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-groups'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: handlers/groups.handler
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: 10
      Role: !GetAtt ApiLambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 503, body: '{"error":"Not deployed yet"}' });

  # Phase 1 — person_node + edge handlers. All three functions ship the same
  # backend bundle; the Handler field selects which entrypoint each one runs.
  GraphFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-graph'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: handlers/graph.handler
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: 10
      Role: !GetAtt ApiLambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 503, body: '{"error":"Not deployed yet"}' });

  NodesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-nodes'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: handlers/nodes.handler
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: 10
      Role: !GetAtt ApiLambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 503, body: '{"error":"Not deployed yet"}' });

  EdgesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-edges'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: handlers/edges.handler
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: 10
      Role: !GetAtt ApiLambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 503, body: '{"error":"Not deployed yet"}' });

  # Phase 2 — membership + invite handlers. Same backend bundle, different
  # entrypoints (Handler field).
  MembersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-members'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: handlers/members.handler
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: 10
      Role: !GetAtt ApiLambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 503, body: '{"error":"Not deployed yet"}' });

  # Phase 3 — identity linking (account <-> person_node). Same backend bundle,
  # different entrypoint (Handler field).
  LinksFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-links'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: handlers/links.handler
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: 10
      Role: !GetAtt ApiLambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 503, body: '{"error":"Not deployed yet"}' });

  InvitesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-invites'
      Runtime: nodejs20.x
      Architectures: [arm64]
      Handler: handlers/invites.handler
      MemorySize: 256
      Timeout: 10
      ReservedConcurrentExecutions: 10
      Role: !GetAtt ApiLambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Code:
        ZipFile: |
          exports.handler = async () => ({ statusCode: 503, body: '{"error":"Not deployed yet"}' });

  # --- API Gateway v2 (HTTP API) ---
  Api:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-api'
      ProtocolType: HTTP

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref Api
      StageName: '$default'
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 100

  MeIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt MeFunction.Arn
      PayloadFormatVersion: '2.0'

  GroupsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GroupsFunction.Arn
      PayloadFormatVersion: '2.0'

  GraphIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GraphFunction.Arn
      PayloadFormatVersion: '2.0'

  NodesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt NodesFunction.Arn
      PayloadFormatVersion: '2.0'

  EdgesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt EdgesFunction.Arn
      PayloadFormatVersion: '2.0'

  MembersIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt MembersFunction.Arn
      PayloadFormatVersion: '2.0'

  InvitesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt InvitesFunction.Arn
      PayloadFormatVersion: '2.0'

  LinksIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Api
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LinksFunction.Arn
      PayloadFormatVersion: '2.0'

  MeGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'GET /api/me'
      Target: !Sub 'integrations/${MeIntegration}'

  GroupsPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'POST /api/groups'
      Target: !Sub 'integrations/${GroupsIntegration}'

  # Phase 1 group-scoped routes. {groupId} is authorized by requireGroupMember
  # inside each handler — the partition key is the isolation boundary.
  GraphGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'GET /api/groups/{groupId}/graph'
      Target: !Sub 'integrations/${GraphIntegration}'

  NodesPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'POST /api/groups/{groupId}/nodes'
      Target: !Sub 'integrations/${NodesIntegration}'

  NodePatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'PATCH /api/groups/{groupId}/nodes/{nodeId}'
      Target: !Sub 'integrations/${NodesIntegration}'

  NodeDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'DELETE /api/groups/{groupId}/nodes/{nodeId}'
      Target: !Sub 'integrations/${NodesIntegration}'

  EdgesPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'POST /api/groups/{groupId}/edges'
      Target: !Sub 'integrations/${EdgesIntegration}'

  EdgePatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'PATCH /api/groups/{groupId}/edges/{edgeId}'
      Target: !Sub 'integrations/${EdgesIntegration}'

  EdgeDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'DELETE /api/groups/{groupId}/edges/{edgeId}'
      Target: !Sub 'integrations/${EdgesIntegration}'

  # Phase 2 membership + invite routes.
  MembersGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'GET /api/groups/{groupId}/members'
      Target: !Sub 'integrations/${MembersIntegration}'

  MemberDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'DELETE /api/groups/{groupId}/members/{accountId}'
      Target: !Sub 'integrations/${MembersIntegration}'

  MemberPatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'PATCH /api/groups/{groupId}/members/{accountId}'
      Target: !Sub 'integrations/${MembersIntegration}'

  InvitesListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'GET /api/groups/{groupId}/invites'
      Target: !Sub 'integrations/${InvitesIntegration}'

  InvitesCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'POST /api/groups/{groupId}/invites'
      Target: !Sub 'integrations/${InvitesIntegration}'

  InviteRevokeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'DELETE /api/groups/{groupId}/invites/{token}'
      Target: !Sub 'integrations/${InvitesIntegration}'

  # Phase 3 identity-linking routes. {accountId} is the account being linked;
  # the handler enforces self-service vs owner-only cross-linking.
  MemberLinkPutRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'PUT /api/groups/{groupId}/members/{accountId}/link'
      Target: !Sub 'integrations/${LinksIntegration}'

  MemberLinkDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'DELETE /api/groups/{groupId}/members/{accountId}/link'
      Target: !Sub 'integrations/${LinksIntegration}'

  # Token-addressed invite routes. The preview (GET) is intentionally public —
  # an invitee sees only the group name before signing in to accept.
  InvitePreviewRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'GET /api/invites/{token}'
      Target: !Sub 'integrations/${InvitesIntegration}'

  InviteAcceptRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Api
      RouteKey: 'POST /api/invites/{token}/accept'
      Target: !Sub 'integrations/${InvitesIntegration}'

  MeFunctionApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MeFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  GroupsFunctionApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GroupsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  GraphFunctionApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GraphFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  NodesFunctionApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NodesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  EdgesFunctionApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EdgesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  MembersFunctionApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MembersFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  InvitesFunctionApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InvitesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  LinksFunctionApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LinksFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  # --- CloudFront (default *.cloudfront.net domain; no custom domain/ACM) ---
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases: !If
          - HasCustomDomain
          - - !Ref DomainName
            - !Sub 'www.${DomainName}'
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref AWS::NoValue
        HttpVersion: http2and3
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: ApiOrigin
            DomainName: !Sub '${Api}.execute-api.${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - PATCH
              - POST
              - DELETE
            Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  # --- GitHub Actions OIDC deploy role ---
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-deploy'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOIDCProvider
                - !Ref GitHubOIDCProvider
                - !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:${AllowedRefPattern}'
      Policies:
        - PolicyName: Deploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: cloudformation:*
                Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*'
              - Effect: Allow
                Action: cloudformation:GetTemplateSummary
                Resource: '*'
              - Effect: Allow
                Action: iam:*
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${AWS::StackName}-*'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
              - Effect: Allow
                Action: lambda:*
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-*'
              - Effect: Allow
                Action: apigateway:*
                Resource: '*'
              - Effect: Allow
                Action: dynamodb:*
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AWS::StackName}-*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${AWS::StackName}-*/index/*'
              - Effect: Allow
                Action: s3:*
                Resource:
                  - !Sub 'arn:aws:s3:::${AWS::StackName}-*'
                  - !Sub 'arn:aws:s3:::${AWS::StackName}-*/*'
              - Effect: Allow
                Action: cloudfront:*
                Resource: '*'
              - Effect: Allow
                Action: acm:DescribeCertificate
                Resource: '*'

Outputs:
  Environment:
    Value: !Ref Environment
  BucketName:
    Value: !Ref SiteBucket
  DistributionId:
    Value: !Ref Distribution
  SiteUrl:
    Value: !Sub 'https://${Distribution.DomainName}'
  ApiId:
    Value: !Ref Api
  MeFunctionName:
    Value: !Ref MeFunction
  GroupsFunctionName:
    Value: !Ref GroupsFunction
  GraphFunctionName:
    Value: !Ref GraphFunction
  NodesFunctionName:
    Value: !Ref NodesFunction
  EdgesFunctionName:
    Value: !Ref EdgesFunction
  MembersFunctionName:
    Value: !Ref MembersFunction
  InvitesFunctionName:
    Value: !Ref InvitesFunction
  LinksFunctionName:
    Value: !Ref LinksFunction
  DeployRoleArn:
    Value: !GetAtt DeployRole.Arn
